services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./web:/app
    depends_on:
      - api

  api:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e '.[dev]' && uvicorn northwind_api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://northwind:northwind@postgres:5432/northwind
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./api:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: northwind
      POSTGRES_USER: northwind
      POSTGRES_PASSWORD: northwind
    ports:
      - "5432:5432"
    volumes:
      - northwind-postgres:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  northwind-postgres:
